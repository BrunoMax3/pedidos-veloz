# OpenTelemetry Collector: recebe traces/métricas dos serviços (OTLP) e
# exporta para um backend (Jaeger/Tempo para traces, Prometheus p/ métricas).
receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch: {}
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Traces -> Jaeger/Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls: { insecure: true }
  # Métricas -> Prometheus (scrape)
  prometheus:
    endpoint: 0.0.0.0:8889
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
