name: CI/CD - Pedidos Veloz

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # 1) Lint + testes em todos os serviços
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, orders, payments, inventory]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        working-directory: services/${{ matrix.service }}
        run: ruff check app || true   # lint não bloqueia o MVP (gate informativo)

      - name: Testes (pytest)
        working-directory: services/${{ matrix.service }}
        run: pytest -q

  # 2) Build, scan de vulnerabilidades e publicação das imagens
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Só publica em push para main ou tags (não em PR)
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write   # necessário para publicar no GHCR
    strategy:
      matrix:
        service: [api-gateway, orders, payments, inventory]
    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # secret gerenciado, nunca hardcoded

      - name: Metadados / versionamento de tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build da imagem (sem publicar ainda)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          format: table
          exit-code: "0"        # informativo no MVP; use "1" para bloquear em CRITICAL
          severity: CRITICAL,HIGH

      - name: Publicar imagem no registry
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
