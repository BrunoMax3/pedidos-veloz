# Ambiente local reproduzível - "Pedidos Veloz"
# Sobe toda a stack com: docker compose up --build
name: pedidos-veloz

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veloz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veloz}
      POSTGRES_DB: ${POSTGRES_DB:-pedidos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veloz}"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"   # painel de gerenciamento (apenas local)
    networks: [backend]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory:
    build: ./services/inventory
    environment:
      SERVICE_NAME: inventory
      INITIAL_STOCK: "100"
    networks: [backend]

  payments:
    build: ./services/payments
    environment:
      SERVICE_NAME: payments
      PAYMENT_GATEWAY_KEY: ${PAYMENT_GATEWAY_KEY:-local-dev-key}
      APPROVAL_RATE: "0.9"
    networks: [backend]

  orders:
    build: ./services/orders
    environment:
      SERVICE_NAME: orders
      DATABASE_URL: postgresql://${POSTGRES_USER:-veloz}:${POSTGRES_PASSWORD:-veloz}@db:5432/${POSTGRES_DB:-pedidos}
      INVENTORY_URL: http://inventory:8000
      PAYMENTS_URL: http://payments:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]

  api-gateway:
    build: ./services/api-gateway
    environment:
      SERVICE_NAME: api-gateway
      ORDERS_URL: http://orders:8000
      INVENTORY_URL: http://inventory:8000
    ports:
      - "8080:8000"   # único serviço exposto externamente
    depends_on:
      - orders
    networks: [frontend, backend]

networks:
  frontend:
  backend:

volumes:
  pgdata:
