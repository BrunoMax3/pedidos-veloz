# Namespace com Pod Security Admission no nível "restricted" (segurança por padrão).
apiVersion: v1
kind: Namespace
metadata:
  name: pedidos-veloz
  labels:
    # Bloqueia pods privilegiados, exige usuário não-root, etc.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
---
# Configurações NÃO sensíveis (12-Factor: config por ambiente).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: pedidos-veloz
data:
  INVENTORY_URL: "http://inventory:8000"
  PAYMENTS_URL: "http://payments:8000"
  ORDERS_URL: "http://orders:8000"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  APPROVAL_RATE: "0.9"
  INITIAL_STOCK: "100"
---
# Credenciais. Em produção use um gestor externo (Sealed Secrets, External
# Secrets Operator, Vault). Os valores abaixo são apenas placeholders base64.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: pedidos-veloz
type: Opaque
data:
  # echo -n 'veloz' | base64  => dmVsb3o=
  POSTGRES_USER: dmVsb3o=
  POSTGRES_PASSWORD: dmVsb3o=
  POSTGRES_DB: cGVkaWRvcw==
  # DATABASE_URL completo
  DATABASE_URL: cG9zdGdyZXNxbDovL3ZlbG96OnZlbG96QHBvc3RncmVzOjU0MzIvcGVkaWRvcw==
  PAYMENT_GATEWAY_KEY: bG9jYWwtZGV2LWtleQ==
